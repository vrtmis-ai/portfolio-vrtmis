name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      # SPA fallback: GitHub Pages serves 404.html for unknown paths, so a
      # client-side route loaded/refreshed directly (/work, /work/:slug,
      # /contact) resolves instead of 404ing.
      - run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5
        with:
          # First run auto-enables Pages with the "GitHub Actions" source via
          # the in-workflow token, so no manual Settings step is needed.
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
